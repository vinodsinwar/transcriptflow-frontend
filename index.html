    <!-- FAQ Schema Markup -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is TranscriptFlow really free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. TranscriptFlow is free with no hidden costs, subscriptions, or usage caps. You can generate transcripts without creating an account or entering payment details."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate are the generated transcripts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Transcripts are based on the captions available for the video, including YouTube's automatic captions. Accuracy is excellent for clear speech and may vary with audio quality, accents, and background noise."
          }
        },
        {
          "@type": "Question",
          "name": "What languages are supported?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Over 125 languages, including English, Spanish, French, German, Chinese, Japanese, Arabic, and Hindi. The video's language is detected automatically."
          }
        },
        {
          "@type": "Question",
          "name": "How fast is the transcript generation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most transcripts are ready in a few seconds. Very long videos can take slightly longer while the full transcript is formatted."
          }
        },
        {
          "@type": "Question",
          "name": "Do you store my video URLs or transcripts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. TranscriptFlow doesn't store video URLs, generated transcripts, or any personal information. Each request is processed independently without data retention."
          }
        },
        {
          "@type": "Question",
          "name": "Which videos can be transcribed?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Any public YouTube video that has captions or subtitles available. Private videos, or videos whose owners disabled captions, can't be transcribed."
          }
        },
        {
          "@type": "Question",
          "name": "How do I copy a YouTube transcript?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Paste the video link, generate the transcript, then click Copy Text to copy the whole thing to your clipboard. You can also download it as TXT, SRT, VTT, PDF, or Word instead of copying."
          }
        },
        {
          "@type": "Question",
          "name": "How do I get a YouTube transcript without an extension?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TranscriptFlow runs in your browser — no Chrome extension or install needed. Paste the YouTube URL on the site and the transcript appears in seconds, on any device."
          }
        },
        {
          "@type": "Question",
          "name": "Does this work on a phone?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. It works in any mobile browser on Android or iPhone. Copy the video's Share link in the YouTube app, paste it on transcriptflow.io, and get the transcript — no app to install."
          }
        }
      ]
    }
    </script>
